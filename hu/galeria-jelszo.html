<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Új galéria jelszó | B. Photography</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/gallery-login.css">
</head>
<body class="gallery-login-page" data-gallery-reset data-lang="hu">
  <div id="site-header"></div>

  <main class="gallery-login-shell">
    <section class="gallery-login-grid">
      <article class="gallery-login-hero">
        <a class="gallery-login-home" id="galleryResetHome" href="/hu/index.html"></a>
        <div>
          <p class="gallery-login-kicker">B. Photography</p>
          <h1 id="galleryResetHeroTitle"></h1>
          <p id="galleryResetHeroCopy"></p>
        </div>
      </article>

      <section class="gallery-login-card">
        <p class="gallery-login-kicker">Jelszó-visszaállítás</p>
        <h2 id="galleryResetTitle"></h2>
        <p id="galleryResetCopy"></p>

        <div class="gallery-login-form">
          <label class="gallery-login-field">
            <span id="galleryResetPasswordLabel"></span>
            <input type="password" id="password" autocomplete="new-password" required>
          </label>

          <label class="gallery-login-field">
            <span id="galleryResetPasswordAgainLabel"></span>
            <input type="password" id="passwordAgain" autocomplete="new-password" required>
          </label>

          <button type="button" class="gallery-login-btn" id="galleryResetBtn"></button>
          <a class="gallery-login-link-btn is-anchor" id="galleryResetLoginLink" href="/hu/galeria-login.html"></a>
          <div class="gallery-login-success" id="galleryResetSuccess"></div>
          <div class="gallery-login-error" id="galleryResetError"></div>
        </div>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/global.js"></script>
  <script src="../js/gallery-reset.js"></script>
</body>
</html>
